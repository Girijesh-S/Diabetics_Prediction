services:
  - type: web
    name: diabetes-predict
    env: python
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn diabetes_web.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: diabetes-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: MODEL_STRICT_MODE
        value: "True"
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"
      - key: EMAIL_HOST
        value: "smtp.gmail.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_USE_SSL
        value: "False"
      - key: EMAIL_HOST_USER
        value: "g0300747@gmail.com"
      - key: EMAIL_HOST_PASSWORD
        value: "your-gmail-app-password-here"
      - key: DEFAULT_FROM_EMAIL
        value: "g0300747@gmail.com"
      - key: EMAIL_TIMEOUT
        value: "30"

databases:
  - name: diabetes-db
    databaseName: diabetes
    plan: free
