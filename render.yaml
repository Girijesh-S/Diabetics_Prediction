services:
  - type: web
    name: diabetes-predict
    env: python
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn diabetes_web.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: diabetes-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: MODEL_STRICT_MODE
        value: "True"
      - key: EMAIL_BACKEND
        value: "prediction.sendgrid_backend.SendgridBackend"
      - key: SENDGRID_API_KEY
        value: "${SENDGRID_API_KEY}"
      - key: DEFAULT_FROM_EMAIL
        value: "g0300747@gmail.com"

databases:
  - name: diabetes-db
    databaseName: diabetes
    plan: free
